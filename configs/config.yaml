data:
  data_dir: "E:/Codes/CV project/training_data1_v2"
  train_ratio: 0.85
  val_ratio: 0.15

modalities:
  - t1c
  - t1n
  - t2f
  - t2w

labels:
  background: 0
  ncr: 1
  ed: 2
  et: 3
  num_classes: 4

training:
  patch_size: [128, 128, 128]
  batch_size: 1
  num_workers: 0
  max_epochs: 100
  val_interval: 1 
  learning_rate: 0.0001
  weight_decay: 0.00001
  mixed_precision: true

loss:
  dice_weight: 0.5
  focal_weight: 0.5
  focal_gamma: 2.0
  focal_alpha: 0.25

model:
  in_channels: 4
  out_channels: 4
  features: [32, 64, 128, 256]

paths:
  checkpoint_dir: "outputs/checkpoints"
  log_dir: "outputs/logs"